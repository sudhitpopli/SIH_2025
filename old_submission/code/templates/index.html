<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Traffic Management System</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #222;
    }

    /* Navbar */
    header {
      background: #222;
      padding: 15px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    header h2 {
      color: #fff;
      margin: 0;
      font-size: 20px;
    }
    nav ul {
      list-style: none;
      display: flex;
      margin: 0;
      padding: 0;
      gap: 12px; /* reduced gap between tabs */
      align-items: center;
    }
    nav ul li a {
      text-decoration: none;
      color: #fff;
      font-weight: bold;
      transition: color 0.3s ease, background-color 0.3s ease;
      padding: 6px 10px; /* slightly reduced padding */
      border-radius: 6px;
      display: inline-block;
      line-height: 1.5;
    }
    nav ul li a:hover,
    nav ul li a.active {
      color: #6dd5ed;
      background-color: rgba(109, 213, 237, 0.15);
    }

    .login-btn {
      background: #6dd5ed;
      color: #000 !important;
      font-weight: bold;
      border-radius: 6px;
      padding: 6px 12px;
      transition: 0.3s;
    }
    .login-btn:hover {
      background: #2193b0;
      color: #fff !important;
    }

    /* Hero Section */
    .main {
      max-width: 700px;
      margin: 80px auto 100px;
      background: linear-gradient(to right, #6dd5ed, #2193b0);
      color: white;
      padding: 70px 40px;
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(33, 147, 176, 0.5);
      text-align: center;
    }
    .main h1 {
      font-size: 3rem;
      margin-bottom: 20px;
      font-weight: bold;
    }
    .main p {
      font-size: 1.2rem;
      margin-bottom: 30px;
    }
    .btn {
      background: white;
      color: #2193b0;
      padding: 14px 40px;
      border: none;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
      font-size: 1.1rem;
      text-decoration: none;
      transition: background-color 0.3s ease, transform 0.2s ease;
      display: inline-block;
    }
    .btn:hover {
      background: #d1e8f7;
      transform: translateY(-2px);
    }

    /* Footer */
    footer {
      background: #222;
      color: white;
      padding: 20px 40px;
      margin-top: 60px;
      text-align: center;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .main {
        margin: 40px 20px;
        padding: 40px 20px;
      }
      .main h1 {
        font-size: 2rem;
      }
      .main p {
        font-size: 1rem;
      }
      .btn {
        padding: 12px 28px;
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <h2>Smart Traffic Management System</h2>
    <nav>
      <ul>
        <li><a href="/" class="active">Home</a></li>
        <li><a href="about">About Us</a></li>
        <li><a href="features">Features</a></li>
        <li><a href="dashboard">Dashboard</a></li>
        <li><a href="simulation">Simulation</a></li>
        <li><a href="contact">Contact</a></li>
        <li><a class="login-btn">👮 {{ username }} </a></li>
      </ul>
    </nav>
  </header>

  <main class="main">
    <h1>Welcome to Smart Traffic Management</h1>
    <p>AI-powered system to make roads safer and smoother.</p>
    <a href="features" class="btn">Explore Features</a>
  </main>

  <footer>
    <p>© 2025 Smart Traffic Management System</p>
  </footer>
</body>
</html>
