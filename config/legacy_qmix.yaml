# Legacy QMIX Configuration
env: sumo

env_args:
  map_path: "maps/connaught_place.net.xml"
  cfg_path: "maps/connaught_place.sumocfg"
  step_length: 1.0
  decision_interval: 5
  episode_limit: 720
  use_gui: False

control_tls: True

# Hyperparameters
hidden_dim: 64
lr: 0.0005
gamma: 0.99
buffer_size: 10000
batch_size: 32
n_episodes: 500
target_update_interval: 20
print_interval: 10

# Logging
save_dir: "./models/legacy"
log_stats: True
