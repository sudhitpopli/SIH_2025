# Indian Standard Road Configuration
env: sumo

env_args:
  map_path: "maps/connaught_place.net.xml"
  cfg_path: "maps/connaught_place.sumocfg"
  step_length: 1.0
  decision_interval: 5
  episode_limit: 720
  use_gui: False
  max_lanes: 8
  yellow_duration: 3

model_description: "Standard model based on Indian IRC guidelines for signal control."
traffic_behavior: "Non-lane-based movement, diverse vehicle types."
notes: "Uses Webster's Method (IRC:93-1985) for optimum cycle time calculation."
